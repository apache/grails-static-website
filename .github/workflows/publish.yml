name: Publish
on:
  push:
    branches:
      - master
  schedule:
    - cron:  '0 */2 * * *'
  workflow_dispatch:
# Prevent two simultaneous publishes from racing on the deploy branch.
# cancel-in-progress=false so the in-flight deploy completes before the next.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    permissions:
      contents: write
    if: github.repository == 'apache/grails-static-website'
    runs-on: ubuntu-latest
    steps:
      - name: "⚙️ Maximize build space"
        run: |
          echo "-- Dotnet"
          sudo rm -rf /usr/share/dotnet
          echo "-- Android"
          sudo rm -rf /usr/local/lib/android
          echo "-- Haskell"
          sudo rm -rf /opt/ghc
          echo "-- CodeQL"
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          df -h
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          develocity-access-key: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
      - name: Publish Main Site
        run: ./gradlew clean publishMainSite --console=plain --no-daemon
        env:
          GITHUB_SLUG: apache/grails-website
          GH_TOKEN: ${{ secrets.GRAILS_GHTOKEN }}
          GH_BRANCH: asf-site-production
          GRAILS_WS_URL: https://grails.apache.org
      # NOTE: A previous "Publish Guides Site" step that pushed to
      # grails-guides/grails-guides-template gh-pages was removed as part
      # of issue #354. https://guides.grails.org/ is served from that
      # frozen gh-pages branch until the new canonical location at
      # https://grails.apache.org/guides/ is fully cut over.
