info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'

# tag::management[]
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
# end::management[]

# tag::dataSource[]
dataSource:
  driverClassName: org.postgresql.Driver
  username: '${SPRING_DATASOURCE_USERNAME:postgres}'
  password: '${SPRING_DATASOURCE_PASSWORD:}'
  pooled: true
  jmxExport: true
environments:
  development:
    dataSource:
      dbCreate: create-drop
      url: '${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devDb?tcpKeepAlive=true}'
  test:
    dataSource:
      dbCreate: update
      url: 'jdbc:postgresql://localhost:5432/testDb?tcpKeepAlive=true'
  production:
    dataSource:
      dbCreate: none
      url: '${SPRING_DATASOURCE_URL}'
# end::dataSource[]

hibernate:
  cache:
    queries: false
    use_second_level_cache: false
    use_query_cache: false
grails:
  mime:
    disable:
      accept:
        header:
          userAgents:
          - Gecko
          - WebKit
          - Presto
          - Trident
    types:
      all: '*/*'
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      form: application/x-www-form-urlencoded
      html:
      - text/html
      - application/xhtml+xml
      js: text/javascript
      json:
      - application/json
      - text/json
      multipartForm: multipart/form-data
      pdf: application/pdf
      rss: application/rss+xml
      text: text/plain
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
  views:
    gsp:
      encoding: UTF-8
      htmlcodec: xml
      codecs:
        expression: html
        scriptlet: html
        taglib: none
        staticparts: none
    default:
      codec: html
  codegen:
    defaultPackage: example
  profile: web
