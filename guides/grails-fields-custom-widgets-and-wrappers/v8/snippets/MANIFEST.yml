# Inventory of code snippets vendored from the upstream sample app.
#
# Each entry records the relative path under this snippets/ directory and
# the original path under the upstream `complete/` sample-app source tree.
# All snippets came from the same source commit (sha below).

source:
  repo: grails-guides/grails-fields-custom-widgets-and-wrappers
  branch: grails8
  sha: "f62446666870d5347f68a34ec89cfc464ec3aa1f"
  capturedAt: "2026-05-02"

